<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>TechTennis</title>
    <script type="text/javascript">
      // Redirect to the root with the path appended as a hash
      // So if someone goes to /techtennis/stringer, they get redirected to /techtennis/#/stringer
      var pathSegmentsToKeep = 1;

      var l = window.location;
      var repoPath = l.pathname.split('/').slice(0, pathSegmentsToKeep + 1).join('/');
      
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        repoPath + '/#' +
        l.pathname.slice(repoPath.length) +
        l.search + l.hash
      );
    </script>
  </head>
  <body>
    Redirecionando...
  </body>
</html>
